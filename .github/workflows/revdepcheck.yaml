name: revdepcheck

on:
  workflow_dispatch:
    inputs:
      reset_revdeps:
        description: "Delete revdep/ before running"
        required: true
        type: boolean
      timeout_minutes:
        description: "Timeout per reverse dependency"
        required: false
        default: 30
        type: numeric 

permissions:
  contents: read

concurrency:
  group: revdepcheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  revdepcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: r-lib/revdepcheck
          needs: check

      - name: Reset revdep state
        if: ${{ inputs.reset_revdeps }}
        shell: Rscript {0}
        run: |
          revdepcheck::revdep_reset()

      - name: Run revdepcheck
        shell: Rscript {0}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          revdepcheck::revdep_check(
            num_workers = 4,
            timeout = as.difftime(
              as.integer("${{ inputs.timeout_minutes }}"),
              units = "mins"
            ),
            env = c(revdepcheck::revdep_env_vars(), NOT_CRAN = TRUE),
            quiet = FALSE
          )

      - name: Show summary
        shell: Rscript {0}
        run: |
          print(revdepcheck::revdep_summary())

      - name: Upload revdep results
        uses: actions/upload-artifact@v7
        with:
          name: revdepcheck-results
          path: revdep/
          retention-days: 14
          if-no-files-found: 'error'

      - name: Fail if revdeps broke
        shell: Rscript {0}
        run: |
          status <- revdepcheck:::report_status(".")
          message("Reverse dependencies OK: ", status$ok)
          message("Reverse dependencies BROKEN: ", status$broken)

          if (status$broken > 0) {
            stop(status$broken, " reverse dependency check(s) failed.")
          }

# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  # build dev site on merged pushes
  push:
    branches: [main, master]
  # build full site on releases
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
      cancel-in-progress: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            local::.
            any::bayesplot
            any::BH
            paul-buerkner/brms
            any::ggplot2
            any::rmarkdown
            any::Rcpp
            any::RcppEigen
            any::RcppParallel
            any::rstan
            any::rstanarm
            any::rstantools
            any::spdep
            any::StanHeaders
            any::knitr
            any::withr
            any::lme4
            any::palmerpenguins
            stan-dev/pkgdown-config

      # pred-measure-workflow needs pre-fitted brms models (~99 MB, not in git).
      # Skipped when data-for-vignettes/ is already present (e.g. local cache).
      - name: Generate vignette data if missing (slow — fits brms models)
        run: |
          VIG_DATA="vignettes/articles-online-only/data-for-vignettes"
          N=$(find "$VIG_DATA" -name '*.Rds' 2>/dev/null | wc -l)
          if [ "$N" -lt 5 ]; then
            echo "::notice title=Vignette data generation::Fitting brms models for data-for-vignettes/ — expect ~10-20 minutes."
            Rscript tests/testthat/data-for-tests/test_data_generation.R --vignettes-only
          else
            echo "Vignette data already present ($N RDS files) — skipping generation."
          fi

      - name: Build site
        run: |
          withr::with_envvar(
            c("NOT_CRAN" = "true"), # this should already be set by setup-r@v2? keeping because vignettes don't build otherwise
            pkgdown::build_site_github_pages(
              lazy = FALSE, # change to TRUE if runner times out.
              run_dont_run = TRUE,
              new_process = TRUE
            )
          )
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
